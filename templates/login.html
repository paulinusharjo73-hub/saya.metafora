<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Login Admin - Metafora.id</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a1a1a; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .logo-text {
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #FFCC00;
            box-shadow: 0 0 5px rgba(255, 204, 0, 0.5);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #FFCC00;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            color: #000;
        }
        button:hover { 
            background: #e6b800; 
            transform: translateY(-2px);
        }
        .error { 
            color: #ff4d4d; 
            font-size: 12px; 
            margin-bottom: 15px;
            background: #fff1f1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ff4d4d;
        }
        .back-link { 
            display: block; 
            margin-top: 20px; 
            font-size: 12px; 
            color: #999; 
            text-decoration: none; 
        }
        .back-link:hover { color: #666; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-text">
            <span style="color: #000;">META</span><span style="color: #FFCC00;">FORA</span>
        </div>

        <form action="/login" method="POST">
            {% if error %}
                <p class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endif %}
            
            <input type="text" name="username" placeholder="Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">MASUK</button>
        </form>

        <a href="/" class="back-link">← Kembali ke Beranda</a>
    </div>

</body>
</html>
